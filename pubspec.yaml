name: smooth_ios_style_toggle
description: >-
  A smooth, fully customizable iOS-style toggle with a pill thumb (~1.7× height),
  adaptive labels beside or inside the thumb, drag gestures, validated sizing, and
  built-in Flutter state management (ValueNotifier / InheritedWidget).
version: 0.2.0
# Repository URL is used as the package homepage on pub.dev.
homepage: https://github.com/Abdul-Haseeb-Rajput/smooth_ios_style_toggle
repository: https://github.com/Abdul-Haseeb-Rajput/smooth_ios_style_toggle
issue_tracker: https://github.com/Abdul-Haseeb-Rajput/smooth_ios_style_toggle/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

topics:
  - toggle
  - switch
  - widget
  - animation
  - ios

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

flutter:
